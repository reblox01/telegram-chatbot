<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><title>Admin Dashboard — Sewelni</title><style>body{font-family:system-ui,sans-serif;max-width:800px;margin:2rem auto;padding:0 1rem}h1{font-size:1.5rem;margin-bottom:1rem}.section{margin-bottom:2rem}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem}.stat{background:#f0f0f0;padding:1rem;border-radius:8px}.stat h3{margin:0 0 0.5rem;font-size:0.9rem;color:#555}.stat p{margin:0;font-size:1.5rem;font-weight:bold}.config-item{margin-bottom:0.5rem}.config-item code{background:#eee;padding:0.1rem 0.3rem;border-radius:4px}button{margin:0.25rem;padding:0.5rem 1rem}#login{text-align:center;margin-top:3rem}</style></head><body><h1>Admin Dashboard</h1><div id='login' style='display:none;'><p>Please log in with Telegram to access the admin panel.</p><script async src='https://telegram.org/js/telegram-widget.js?22' data-telegram-login='Sewelni_bot' data-size='large' data-auth-url='/api/web-admin/auth' data-request-access='write'></script></div><div id='dashboard' style='display:none;'><div class='section'><h2>📊 Today's Stats</h2><div class='stats'><div class='stat'><h3>Active Users</h3><p id='stat-users'>0</p></div><div class='stat'><h3>Messages</h3><p id='stat-messages'>0</p></div><div class='stat'><h3>Searches</h3><p id='stat-searches'>0</p></div><div class='stat'><h3>Premium Users</h3><p id='stat-premium'>0</p></div></div></div><div class='section'><h2>⚙️ Configuration</h2><p><strong>Free Model:</strong> <code id='cfg-free-model'>...</code></p><p><strong>Premium Models:</strong> <code id='cfg-premium-models'>...</code></p><p><strong>Free Limits:</strong> <code id='cfg-free-limits'>...</code></p><p><strong>Premium Limits:</strong> <code id='cfg-premium-limits'>...</code></p><p><strong>Premium Price:</strong> <code id='cfg-price'>...</code> ⭐</p></div><div class='section'><h2>🔧 Actions</h2><button id='btn-set-free-model'>Set Free Model</button><button id='btn-set-premium-model'>Set Premium Model</button><button id='btn-set-free-limits'>Set Free Limits</button><button id='btn-set-premium-limits'>Set Premium Limits</button><button id='btn-set-price'>Set Premium Price</button><button id='btn-grant'>Grant Premium</button><button id='btn-revoke'>Revoke Premium</button><button id='btn-refresh'>Refresh</button></div></div><script>(async function(){async function loadData(){try{const res=await fetch('/api/web-admin/data',{credentials:'include'});if(res.status===401){document.getElementById('login').style.display='block';document.getElementById('dashboard').style.display='none';return}if(!res.ok)throw new Error('Failed to load: '+res.status);const data=await res.json();document.getElementById('login').style.display='none';document.getElementById('dashboard').style.display='block';document.getElementById('stat-users').textContent=data.stats.activeUsers;document.getElementById('stat-messages').textContent=data.stats.messagesToday;document.getElementById('stat-searches').textContent=data.stats.searchesToday;document.getElementById('stat-premium').textContent=data.stats.premiumUsers;document.getElementById('cfg-free-model').textContent=data.config.freeModel;document.getElementById('cfg-premium-models').textContent=(data.config.premiumModels||[]).join(', ');document.getElementById('cfg-free-limits').textContent=`${data.config.freeLimits.messagesPerDay} msgs / ${data.config.freeLimits.searchesPerDay} searches / ${data.config.freeLimits.remindersActive} reminds`;document.getElementById('cfg-premium-limits').textContent=`${data.config.premiumLimits.messagesPerDay} msgs / ${data.config.premiumLimits.searchesPerDay} searches / ${data.config.premiumLimits.remindersActive} reminds`;document.getElementById('cfg-price').textContent=data.config.premiumPrice;}catch(err){console.error(err);alert('Error: '+err.message);}}async function performAction(action,params){const res=await fetch('/api/web-admin/action',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({action,params})});const result=await res.json();if(result.ok){alert('Success: '+result.message);loadData();}else{alert('Error: '+(result.error||'Unknown error'));}}document.getElementById('btn-set-free-model').addEventListener('click',async()=>{const model=prompt('Enter new free model slug (e.g., stepfun/step-3.5-flash:free):');if(model)await performAction('set_free_model',{model});});document.getElementById('btn-set-premium-model').addEventListener('click',async()=>{const models=prompt('Enter premium models, comma-separated (e.g., anthropic/claude-3.5-sonnet, openai/gpt-4o-mini):');if(models)await performAction('set_premium_model',{models:models.split(',').map(s=>s.trim())});});document.getElementById('btn-set-free-limits').addEventListener('click',async()=>{const input=prompt('Enter limits: \"msgs searches reminds\" (e.g., 20 5 3) or \"-1 -1 -1\" for unlimited:');if(input){const parts=input.split(/\\s+/).map(Number);if(parts.length===3){await performAction('set_free_limits',{messagesPerDay:parts[0],searchesPerDay:parts[1],remindersActive:parts[2]});}}});document.getElementById('btn-set-premium-limits').addEventListener('click',async()=>{const input=prompt('Enter limits: \"msgs searches reminds\" (e.g., -1 -1 -1):');if(input){const parts=input.split(/\\s+/).map(Number);if(parts.length===3){await performAction('set_premium_limits',{messagesPerDay:parts[0],searchesPerDay:parts[1],remindersActive:parts[2]});}}});document.getElementById('btn-set-price').addEventListener('click',async()=>{const price=prompt('Enter premium price in Telegram Stars (e.g., 100):');if(price)await performAction('set_price',{price:parseInt(price)});});document.getElementById('btn-grant').addEventListener('click',async()=>{const chatId=prompt('Enter chat_id to grant premium:');const days=prompt('Enter number of days (default 30):');if(chatId)await performAction('grant',{chat_id:chatId,days:parseInt(days)||30});});document.getElementById('btn-revoke').addEventListener('click',async()=>{const chatId=prompt('Enter chat_id to revoke premium:');if(chatId)await performAction('revoke',{chat_id:chatId});});document.getElementById('btn-refresh').addEventListener('click',loadData);loadData();})();</script></body></html>
